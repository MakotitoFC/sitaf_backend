spring:
  application:
    name: sitaf-backend
  datasource:
    url: jdbc:postgresql://localhost:5432/sitaf_db
    username: sitaf_user
    password: sitaf_password
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

server:
  port: 8080

# Mock SISMED Integration properties
sismed:
  mock: true

fabric:
  channelName: "mychannel"
  chaincodeName: "medicamentos"
  peerEndpoint: "localhost:7051"
  peerOverride: "peer0.org1.example.com"
  mspId: "Org1MSP"
  tlsCertPath: "C:/PERSONAL/PROYECTOS/PORTAFOLIO/sitaf/fabric-samples/test-network/organizations/peerOrganizations/org1.example.com/peers/peer0.org1.example.com/tls/ca.crt"
  certPath: "C:/PERSONAL/PROYECTOS/PORTAFOLIO/sitaf/fabric-samples/test-network/organizations/peerOrganizations/org1.example.com/users/User1@org1.example.com/msp/signcerts/cert.pem"
  keyPath: "C:/PERSONAL/PROYECTOS/PORTAFOLIO/sitaf/fabric-samples/test-network/organizations/peerOrganizations/org1.example.com/users/User1@org1.example.com/msp/keystore/20b22efce23d3696688ff0ff9bdc740d2aeb4f89ce5ce1af42a75fbc68920d33_sk"
